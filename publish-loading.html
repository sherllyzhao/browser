<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data:; img-src 'self' data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正在打开发布窗口</title>
  <style>
    :root {
      --ink: #263238;
      --muted: #7b8794;
      --paper: #fffaf0;
      --line: rgba(38, 50, 56, 0.12);
      --accent: #ff8a3d;
      --accent-deep: #c8521b;
      --mint: #8ad7c1;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 138, 61, 0.25), transparent 28%),
        radial-gradient(circle at 82% 78%, rgba(138, 215, 193, 0.32), transparent 30%),
        linear-gradient(135deg, #fffaf0 0%, #f7efe0 100%);
    }

    body {
      display: grid;
      place-items: center;
    }

    .card {
      position: relative;
      width: min(420px, calc(100vw - 48px));
      padding: 34px 34px 30px;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 24px 70px rgba(94, 71, 44, 0.18);
      backdrop-filter: blur(18px);
      animation: cardIn 360ms ease-out both;
    }

    .orbit {
      position: relative;
      width: 84px;
      height: 84px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: conic-gradient(from 120deg, var(--accent), #ffd39d, var(--mint), var(--accent));
      animation: spin 1.15s linear infinite;
    }

    .orbit::before {
      content: "";
      position: absolute;
      inset: 9px;
      border-radius: 50%;
      background: var(--paper);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.9);
    }

    .orbit::after {
      content: "";
      position: absolute;
      top: 4px;
      left: 50%;
      width: 14px;
      height: 14px;
      margin-left: -7px;
      border-radius: 50%;
      background: var(--accent-deep);
      box-shadow: 0 0 0 8px rgba(255, 138, 61, 0.18);
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: 23px;
      line-height: 1.35;
      letter-spacing: 0.02em;
    }

    .platform {
      margin-top: 10px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .steps {
      display: grid;
      gap: 10px;
      margin-top: 26px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(38, 50, 56, 0.06);
      color: #9aa4ae;
      font-size: 13px;
      transition: background 220ms ease, color 220ms ease, border-color 220ms ease, transform 220ms ease;
    }

    .step .indicator {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      flex: 0 0 auto;
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 220ms ease, box-shadow 220ms ease;
    }

    .step .indicator .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.55;
      transition: background 220ms ease, opacity 220ms ease;
    }

    .step .indicator .check {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .step .indicator .check svg {
      width: 12px;
      height: 12px;
    }

    /* 进行中：橙色高亮 + 呼吸动画 */
    .step.active {
      color: #46515c;
      background: rgba(255, 244, 232, 0.95);
      border-color: rgba(255, 138, 61, 0.45);
      animation: stepPulse 1.6s ease-in-out infinite;
    }

    .step.active .indicator {
      background: rgba(255, 138, 61, 0.18);
      box-shadow: 0 0 0 5px rgba(255, 138, 61, 0.12);
    }

    .step.active .indicator .dot {
      background: var(--accent);
      opacity: 1;
    }

    /* 已完成：对勾 + 淡色静止 */
    .step.done {
      color: #8a9098;
      background: rgba(244, 250, 246, 0.85);
      border-color: rgba(138, 215, 193, 0.4);
      animation: none;
    }

    .step.done .indicator {
      background: var(--mint);
      box-shadow: none;
    }

    .step.done .indicator .dot {
      display: none;
    }

    .step.done .indicator .check {
      display: inline-flex;
    }

    .hint {
      margin-top: 20px;
      text-align: center;
      color: #8a744f;
      font-size: 12px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes stepPulse {
      0%,
      100% {
        transform: translateX(0);
        opacity: 0.9;
      }
      45% {
        transform: translateX(4px);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main class="card" aria-live="polite">
    <div class="orbit" aria-hidden="true"></div>
    <h1>正在打开发布窗口</h1>
    <div class="platform" id="platformText">正在准备发布环境</div>
    <section class="steps" id="steps">
      <div class="step" data-step="0">
        <span class="indicator"><span class="dot"></span><span class="check"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3.5 8.5l3 3 6-6.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>
        <span>恢复账号登录状态</span>
      </div>
      <div class="step" data-step="1">
        <span class="indicator"><span class="dot"></span><span class="check"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3.5 8.5l3 3 6-6.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>
        <span>同步平台 Cookie 和 Storage</span>
      </div>
      <div class="step" data-step="2">
        <span class="indicator"><span class="dot"></span><span class="check"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3.5 8.5l3 3 6-6.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>
        <span>加载目标发布页面</span>
      </div>
    </section>
    <div class="hint">请稍等，完成后会自动切换到发布页面。</div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const platform = params.get('platform') || '';
    const contentType = params.get('contentType') || '';
    const text = [platform, contentType].filter(Boolean).join(' · ');
    if (text) {
      document.getElementById('platformText').textContent = text;
    }

    // 暴露全局接口，主进程通过 webContents.executeJavaScript 调用
    // index: 0/1/2  status: 'pending' | 'active' | 'done'
    window.__setLoadingStep = function (index, status) {
      try {
        const el = document.querySelector('.step[data-step="' + index + '"]');
        if (!el) return false;
        el.classList.remove('active', 'done');
        if (status === 'active' || status === 'done') {
          el.classList.add(status);
        }
        return true;
      } catch (e) {
        return false;
      }
    };

    // 批量设置：[{index, status}, ...]
    window.__setLoadingSteps = function (list) {
      if (!Array.isArray(list)) return false;
      list.forEach(function (item) {
        if (item && typeof item.index === 'number') {
          window.__setLoadingStep(item.index, item.status);
        }
      });
      return true;
    };
  </script>
</body>
</html>
