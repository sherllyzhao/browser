name: Build macOS

on:
  push:
    branches:
      - main
      - ios
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - ios
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build environment (dev or prod)'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for macOS (dev)
        if: github.event.inputs.environment == 'dev' || contains(github.ref, 'refs/heads/')
        run: npm run build:mac:dev

      - name: Build for macOS (prod)
        if: github.event.inputs.environment == 'prod' || startsWith(github.ref, 'refs/tags/')
        run: npm run build:mac:prod

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ github.sha }}
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.dmg
            dist/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
