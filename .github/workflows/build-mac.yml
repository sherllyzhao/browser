name: Release macOS

on:
  push:
    branches:
      - ios
    tags:
      - 'v*'
  pull_request:
    branches:
      - ios
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build environment (dev or prod)'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare macOS icon
        run: |
          # Extract the largest PNG from ICO, then upscale to 1024x1024
          python3 -c "
          import struct
          with open('icon.ico', 'rb') as f:
              ico = f.read()
          count = struct.unpack('<H', ico[4:6])[0]
          best_off = best_sz = best_w = 0
          for i in range(count):
              e = ico[6+i*16:6+i*16+16]
              w = e[0] or 256
              sz = struct.unpack('<I', e[8:12])[0]
              off = struct.unpack('<I', e[12:16])[0]
              if w > best_w:
                  best_w, best_off, best_sz = w, off, sz
          with open('icon_extracted.png', 'wb') as f:
              f.write(ico[best_off:best_off+best_sz])
          print(f'Extracted {best_w}x{best_w} PNG from ICO')
          "
          # Use macOS built-in sips to resample to 1024x1024
          sips -z 1024 1024 icon_extracted.png --out icon.png
          echo "icon.png is now $(sips -g pixelWidth -g pixelHeight icon.png)"

      - name: Clean up DMG mounts
        run: |
          hdiutil info | grep "ZhCloud-Browser" | awk '{print $1}' | xargs -I{} hdiutil detach {} -force 2>/dev/null || true

      - name: Install dependencies
        run: npm ci

      - name: Build for macOS (dev branch smoke build)
        if: (!startsWith(github.ref, 'refs/tags/')) && (github.event_name != 'workflow_dispatch' || github.event.inputs.environment == 'dev')
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:mac:dev

      - name: Build for macOS (prod manual build)
        if: (!startsWith(github.ref, 'refs/tags/')) && github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:mac:prod

      - name: Publish macOS release to GitHub
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run release:mac:prod

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ github.sha }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
          retention-days: 30
