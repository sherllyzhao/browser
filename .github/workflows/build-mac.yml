name: Build macOS

on:
  push:
    branches:
      - main
      - ios
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - ios
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build environment (dev or prod)'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-13

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Prepare macOS icon
        run: |
          # icon.png is actually an ICO file, need to extract and resize for macOS
          # Extract the 256x256 PNG from ICO, then upscale to 1024x1024
          python3 -c "
          import struct
          with open('icon.ico', 'rb') as f:
              ico = f.read()
          count = struct.unpack('<H', ico[4:6])[0]
          best_off = best_sz = best_w = 0
          for i in range(count):
              e = ico[6+i*16:6+i*16+16]
              w = e[0] or 256
              sz = struct.unpack('<I', e[8:12])[0]
              off = struct.unpack('<I', e[12:16])[0]
              if w > best_w:
                  best_w, best_off, best_sz = w, off, sz
          with open('icon_extracted.png', 'wb') as f:
              f.write(ico[best_off:best_off+best_sz])
          print(f'Extracted {best_w}x{best_w} PNG from ICO')
          "
          # Use macOS built-in sips to resample to 1024x1024
          sips -z 1024 1024 icon_extracted.png --out icon.png
          echo "icon.png is now $(sips -g pixelWidth -g pixelHeight icon.png)"

      - name: Install dependencies
        run: npm ci

      - name: Build for macOS (dev)
        if: github.event.inputs.environment == 'dev' || contains(github.ref, 'refs/heads/')
        run: npm run build:mac:dev

      - name: Build for macOS (prod)
        if: github.event.inputs.environment == 'prod' || startsWith(github.ref, 'refs/tags/')
        run: npm run build:mac:prod

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ github.sha }}
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.dmg
            dist/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
