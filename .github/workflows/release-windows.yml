name: Release Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_to_release:
        description: 'Publish exe assets to GitHub Release'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-2019

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Windows artifacts
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_release != 'true'
        run: npm run build:win:prod

      - name: Upload Windows artifacts
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_release != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.sha }}
          path: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
          retention-days: 30

      - name: Publish Windows Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_release == 'true')
        run: npm run release:win:prod
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
